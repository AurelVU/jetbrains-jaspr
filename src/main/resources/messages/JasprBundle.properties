# Scope Code Vision
jaspr.scope.name=Jaspr Component Scope
jaspr.scope.what.is.this=What is this?

# @client \u2014 renders on server (SSR), then hydrates on client
jaspr.scope.client.label=Client (hydrated)
jaspr.scope.client.tooltip=Renders on server, hydrates on client
jaspr.scope.client.description=This component has the <b>@client</b> annotation.<br>It is pre-rendered on the server during SSR and then <b>hydrated</b> (made interactive) on the client.<br>Both server and client code is generated for this component.

# Client-only \u2014 runs exclusively on the client
jaspr.scope.client.only.label=Client only
jaspr.scope.client.only.tooltip=Runs only on the client
jaspr.scope.client.only.description=This component is located in a <b>client-only</b> file.<br>It runs exclusively in the browser and is not pre-rendered on the server.

# @island \u2014 isolated interactive region within server-rendered page
jaspr.scope.island.label=Island
jaspr.scope.island.tooltip=Server-rendered with isolated client interactivity
jaspr.scope.island.description=This component has the <b>@island</b> annotation.<br>It is pre-rendered on the server and independently hydrated on the client as an isolated interactive region.<br>Islands are loaded and hydrated separately from other client components.

# Server \u2014 renders only on the server
jaspr.scope.server.label=Server
jaspr.scope.server.tooltip=Renders only on the server
jaspr.scope.server.description=This component renders <b>only on the server</b>.<br>It produces static HTML and is never sent to or executed on the client.

# Shared \u2014 available in both server and client contexts
jaspr.scope.shared.label=Shared
jaspr.scope.shared.tooltip=Available in both server and client contexts
jaspr.scope.shared.description=This component is in a <b>shared</b> location.<br>It can be used in both server and client contexts depending on how it is imported.

